name: CI

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Static checks
        run: |
          bash -n scripts/start-issue
          shellcheck scripts/start-issue
          git diff --check

      - name: Legacy environment drift check
        run: |
          legacy_name="CLAUDE""_WORKTREE_DIR"
          if grep -R --line-number "$legacy_name" scripts README.md docs test .github; then
            echo "Legacy Claude worktree environment variable name must not be used."
            exit 1
          fi

      - name: Integration tests
        run: mise exec -- bats test
